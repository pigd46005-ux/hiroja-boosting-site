<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary!</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff5f7; color: #d63384; text-align: center; margin: 0; padding: 20px; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); max-width: 500px; margin: 50px auto; }
        h1 { font-size: 2rem; }
        p { font-size: 1.1rem; color: #555; }
        .photo-placeholder { width: 100%; height: 250px; background: #eee; border-radius: 15px; margin: 20px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .photo-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .buttons { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        button { padding: 15px 30px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-yes { background: #d63384; color: white; }
        .btn-yes:hover { transform: scale(1.1); background: #b02a6b; }
        .btn-no { background: #f8d7da; color: #721c24; }
        #message { display: none; margin-top: 20px; font-weight: bold; color: #d63384; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Happy Anniversary! ❤️</h1>
        <p>To my favorite person,</p>
        
        <div class="photo-placeholder">
            <img src="our-photo.jpg" alt="Us">
        </div>

        <p>I am so lucky to have you. Ready for our anniversary date?</p>

        <div class="buttons">
            <button class="btn-yes" onclick="showLove()">YES! 🌹</button>
            <button class="btn-no" onmouseover="moveButton(this)">No 🏃‍♂️</button>
        </div>

        <div id="message">
            Yay! I'll see you later! I love you so much! ✨
        </div>
    </div>

    <script>
        function showLove() {
            document.getElementById('message').style.display = 'block';
            document.querySelector('.buttons').style.display = 'none';
        }

        // This makes the "No" button run away when he tries to click it!
        function moveButton(btn) {
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.position = 'absolute';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }
    </script>

</body>
</html>
