<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary! ❤️</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff5f7; color: #d63384; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); max-width: 500px; margin: 50px auto; position: relative; }
        h1 { font-size: 2rem; }
        p { font-size: 1.1rem; color: #555; }
        
        /* Photo area - Name your photo 'us.jpg' when you upload it to GitHub */
        .photo-placeholder { width: 100%; height: 250px; background: #ffebee; border-radius: 15px; margin: 20px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .photo-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        
        .buttons { display: flex; justify-content: center; gap: 20px; margin-top: 30px; height: 50px; }
        button { padding: 12px 25px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        
        .btn-yes { background: #d63384; color: white; min-width: 100px; }
        .btn-yes:hover { transform: scale(1.1); background: #b02a6b; }
        
        .btn-no { background: #f8d7da; color: #721c24; min-width: 100px; z-index: 999; }
        
        #message { display: none; margin-top: 20px; font-weight: bold; color: #d63384; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Happy Anniversary! ❤️</h1>
        <p>To my favorite person,</p>
        
        <div class="photo-placeholder">
            <img src="us.jpg" alt="Our Picture">
        </div>

        <p>I'm so lucky to have you. Ready for our anniversary date?</p>

        <div class="buttons" id="btnContainer">
            <button class="btn-yes" onclick="showLove()">YES! 🌹</button>
            <button class="btn-no" id="noBtn" onmouseover="moveButton()">No 🏃‍♂️</button>
        </div>

        <div id="message">
            Yay! I'll see you later! I love you so much! ✨
        </div>
    </div>

    <script>
        function showLove() {
            document.getElementById('message').style.display = 'block';
            document.getElementById('btnContainer').style.display = 'none';
        }

        // The "Runaway" logic
        function moveButton() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
